<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>upload file</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        html,body{
            width:100%;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        input{
            display: none;
        }
div {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    min-width: 250px;
    min-height: 80px;
    padding: 15px 25px;

    background-color: #045535;
    color: white;
    border-radius: 20px;
    user-select: none;
    font-size: clamp(12px, 3vw, 40px);

    white-space: nowrap; /* Keep text on one line */
}
        #upload:hover{
            background-color: #0e8c4a;
            cursor:pointer;
        }
        </style>
</head>
<body>
    <input id="file" type="file" multiple>
    <div id="upload">
        upload files
    </div>
    <script src="upload.js"></script>
</body>
</html>
