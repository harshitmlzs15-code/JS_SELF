<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
      body{
    background-color:#8d81e6;
    display:flex;
    align-items:flex-start;
    gap:30px;
    padding:20px;
}
#main{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    max-width: 300px;
    max-height: 300px;
    padding: 15px 25px;
    

    background-color: #ffe6e6;
    color: rgb(0, 0, 0);
    border-radius: 20px;
    user-select: none;
}
.frm{
    width: 100%;
    height: 20px;
    margin: 10px 0px;
    padding: 4px 10px;
    border-radius: 25px;
    border: 1px solid #9358bd;
}
.submit{
    background-color: #9358bd;
    color: white;
    font-size: 10px;
    font-weight: bold;
    border-radius: 25px;
    min-width: 100%;
    min-height: 20px;
    border: 1px solid #7a3e9c;
}
.submit:hover{
    background-color: #7a3e9c;
    cursor: pointer;
}

.imge{
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
}
.imge img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    overflow: hidden;
}
.profile{
    width: 320px;
    min-height: 180px;
background-color: #ffe6e6;
    border: 1px solid rgb(82,82,82);
    border-radius: 20px;
    padding: 20px;
    color: rgb(0, 0, 0);
    margin: 5px 0px 0px 20px;
    overflow: hidden; /* Prevents the card from growing */
    display: flex;
     flex-direction: column;

}
.name{
    margin: 10px 0px 3px;
}
.prof{
    margin: 2px 0px 2px;
    font-weight: bold;
}
.about{
    margin: 1px 0px 1px;
}
#cards{
    display:grid;

    grid-template-columns: repeat(4, 320px);

    gap: 20px 20px;

    flex:1;
    align-items: start;
}



</style>

</head>
<body>
    <div id="main">
        <h1>Submit your details</h1>
    <form>
        <input type="text" name="name" class="frm" placeholder="Enter your name">
        <input type="text" name="email" class="frm" placeholder="Enter your profession">
        <input type="text" name="about" class="frm" placeholder="Enter something about yourself">
        <input type = "url" name="link" class="frm" placeholder="Enter your profile image link">
        <input type="submit" class="submit" value="Submit">
    </form>
    </div>
    <div id="cards"></div>
